[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
solc           = "0.8.30"
optimizer      = true
optimizer_runs = 200
deny           = "warnings"

[profile.default.fuzz]
runs = 1000

[invariant]
runs                = 256
depth               = 500
failure-persist-dir = "/dev/null"
